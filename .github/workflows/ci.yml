name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Offline non-hardware validation suite
        run: npm run test:full

      - name: Start Local Brain companion server
        run: |
          pkill -f "companion/server.js" 2>/dev/null || true
          sleep 1
          node companion/server.js > companion-server.log 2>&1 &
          echo $! > companion-server.pid
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:31313/health >/dev/null 2>&1; then
              echo "Companion server is up."
              exit 0
            fi
            sleep 1
          done
          echo "Companion server failed to start."
          cat companion-server.log
          exit 1

      - name: Server smoke test (mock provider, no Ollama required)
        run: node scripts/smoke-test.js

      - name: Production jobs API contract (real server route)
        run: npm run test:jobs:production

      - name: M4 relay end-to-end (two servers, discovery + routing + fallback)
        run: npm run test:relay:e2e

      - name: Stop companion server
        if: always()
        run: |
          if [ -f companion-server.pid ]; then
            kill "$(cat companion-server.pid)" 2>/dev/null || true
            rm -f companion-server.pid
          fi
          rm -f companion-server.log
